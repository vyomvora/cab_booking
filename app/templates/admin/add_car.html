{% extends 'base.html' %}

{% block title %}Add New Car{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header">
                    <h3>Add New Car</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="model">Car Model</label>
                            <input type="text" class="form-control" id="model" name="model" required>
                        </div>
                        <div class="form-group">
                            <label for="capacity">Capacity (No. of Passengers)</label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label for="rate_per_km">Rate per KM (€)</label>
                            <input type="number" class="form-control" id="rate_per_km" name="rate_per_km" step="0.01" min="0.1" required>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">Add Car</button>
                            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
