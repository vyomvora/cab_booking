<!-- templates/user/book_cab.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Cab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .location-input-container {
            position: relative;
            margin-bottom: 15px;
        }
        .location-details {
            margin-top: 5px;
            font-size: 0.9em;
            color: #666;
        }
        #trip-details {
            margin: 20px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Book a Cab</h1>
        
        <form id="bookingForm" method="POST" action="{{ url_for('user.book_cab') }}">
            <div class="location-input-container">
                <label for="pickup">Pickup Location:</label>
                <input type="text" id="pickup" name="pickup" placeholder="Enter pickup location" required>
                <div id="pickup-details" class="location-details"></div>
                <input type="hidden" id="pickup_lat" name="pickup_lat">
                <input type="hidden" id="pickup_lng" name="pickup_lng">
                <input type="hidden" id="pickup_address" name="pickup_address">
            </div>
            
            <div class="location-input-container">
                <label for="dropoff">Drop-off Location:</label>
                <input type="text" id="dropoff" name="dropoff" placeholder="Enter drop-off location" required>
                <div id="dropoff-details" class="location-details"></div>
                <input type="hidden" id="dropoff_lat" name="dropoff_lat">
                <input type="hidden" id="dropoff_lng" name="dropoff_lng">
                <input type="hidden" id="dropoff_address" name="dropoff_address">
            </div>
            
            <div class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>
            </div>
            
            <div class="form-group">
                <label for="time">Time:</label>
                <input type="time" id="time" name="time" required>
            </div>
            
            <div class="form-group">
                <label for="car_type">Car Type:</label>
                <select id="car_type" name="car_type" required>
                    <option value="">Select a car type</option>
                    {% for car in cars %}
                    <option value="{{ car.id }}">{{ car.model }} ({{ car.type }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div id="trip-details">
                <p>Estimated distance: <span id="distance">-</span></p>
                <p>Estimated duration: <span id="duration">-</span></p>
                <p>Estimated fare: <span id="fare">-</span></p>
            </div>
            
            <button type="submit" class="btn btn-primary">Book Now</button>
        </form>
    </div>

    <script>
        // Initialize autocomplete functionality
        function initAutocomplete() {
            // Initialize autocomplete for pickup location
            const pickupInput = document.getElementById("pickup");
            const pickupAutocomplete = new google.maps.places.Autocomplete(pickupInput);
            pickupAutocomplete.addListener("place_changed", () => {
                const place = pickupAutocomplete.getPlace();
                if (!place.geometry) {
                    alert("No details available for this place");
                    return;
                }
                
                // Store location data in hidden fields
                document.getElementById("pickup_lat").value = place.geometry.location.lat();
                document.getElementById("pickup_lng").value = place.geometry.location.lng();
                document.getElementById("pickup_address").value = place.formatted_address;
                document.getElementById("pickup-details").textContent = place.formatted_address;
                
                // Calculate route if both pickup and dropoff are set
                calculateRoute();
            });
            
            // Initialize autocomplete for dropoff location
            const dropoffInput = document.getElementById("dropoff");
            const dropoffAutocomplete = new google.maps.places.Autocomplete(dropoffInput);
            dropoffAutocomplete.addListener("place_changed", () => {
                const place = dropoffAutocomplete.getPlace();
                if (!place.geometry) {
                    alert("No details available for this place");
                    return;
                }
                
                // Store location data in hidden fields
                document.getElementById("dropoff_lat").value = place.geometry.location.lat();
                document.getElementById("dropoff_lng").value = place.geometry.location.lng();
                document.getElementById("dropoff_address").value = place.formatted_address;
                document.getElementById("dropoff-details").textContent = place.formatted_address;
                
                // Calculate route if both pickup and dropoff are set
                calculateRoute();
            });
            
            // Try to get user's current location for pickup
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    // Reverse geocode to get address
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: userLocation }, (results, status) => {
                        if (status === "OK" && results[0]) {
                            pickupInput.value = results[0].formatted_address;
                            document.getElementById("pickup_lat").value = userLocation.lat;
                            document.getElementById("pickup_lng").value = userLocation.lng;
                            document.getElementById("pickup_address").value = results[0].formatted_address;
                            document.getElementById("pickup-details").textContent = results[0].formatted_address;
                        }
                    });
                });
            }
        }
        
        // Calculate route between pickup and dropoff locations using Distance Matrix
        function calculateRoute() {
            const pickupLat = document.getElementById("pickup_lat").value;
            const pickupLng = document.getElementById("pickup_lng").value;
            const dropoffLat = document.getElementById("dropoff_lat").value;
            const dropoffLng = document.getElementById("dropoff_lng").value;
            
            if (!pickupLat || !pickupLng || !dropoffLat || !dropoffLng) {
                return;
            }
            
            const pickupPos = new google.maps.LatLng(parseFloat(pickupLat), parseFloat(pickupLng));
            const dropoffPos = new google.maps.LatLng(parseFloat(dropoffLat), parseFloat(dropoffLng));
            
            const service = new google.maps.DistanceMatrixService();
            service.getDistanceMatrix(
                {
                    origins: [pickupPos],
                    destinations: [dropoffPos],
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.METRIC
                },
                (response, status) => {
                    if (status === "OK") {
                        const distance = response.rows[0].elements[0].distance;
                        const duration = response.rows[0].elements[0].duration;
                        
                        document.getElementById("distance").textContent = distance.text;
                        document.getElementById("duration").textContent = duration.text;
                        
                        // Calculate estimated fare (example: base fare + distance rate + time rate)
                        const baseFare = 5;
                        const distanceRate = 2; // $ per km
                        const timeRate = 0.5; // $ per minute
                        
                        const distanceKm = distance.value / 1000;
                        const durationMin = duration.value / 60;
                        
                        const fare = baseFare + (distanceKm * distanceRate) + (durationMin * timeRate);
                        document.getElementById("fare").textContent = "$" + fare.toFixed(2);
                    } else {
                        alert("Could not calculate route: " + status);
                    }
                }
            );
        }
    </script>
    
    <!-- Load Google Maps JavaScript API with your API key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyALaK60mN_SCmnYnn2nuEp9KMyd4UvATDk&libraries=places,geometry&callback=initAutocomplete" async defer></script>

</body>
</html>
