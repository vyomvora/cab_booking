      - echo "Running SonarQube security analysis..."
      - sonar-scanner -Dsonar.projectKey=cab-booking -Dsonar.sources=. -Dsonar.host.url=http://108.129.111.133:8000 -Dsonar.login=sqa_06c4f4774a65e442659208d8b3afa9bd57b2a8f3
