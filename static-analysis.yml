version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running Pylint static analysis..."
      - find . -name "*.py" | xargs pylint --disable=C0301,R0911,R0914,W0718,R0915,R0903,C0116

artifacts:
  files:
    - '**/*'
