version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running Pylint static analysis..."
      - find . -name "*.py" | xargs pylint --fail-under=7

artifacts:
  files:
    - '**/*'
